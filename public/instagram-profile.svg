<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#050505"/>
  
  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="180" stroke="#14b8a6" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="200" r="160" stroke="#14b8a6" stroke-width="0.3" opacity="0.1"/>
  
  <!-- Hexagon outer (glow effect) -->
  <polygon points="200,40 320,110 320,250 200,320 80,250 80,110" stroke="#14b8a6" stroke-width="3" fill="none" opacity="0.3"/>
  
  <!-- Hexagon main -->
  <polygon points="200,55 310,118 310,242 200,305 90,242 90,118" stroke="#14b8a6" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Hexagon inner fill -->
  <polygon points="200,70 295,128 295,232 200,290 105,232 105,128" fill="#14b8a6" opacity="0.05"/>
  
  <!-- 90 number - big and bold -->
  <text x="200" y="215" font-family="Inter, Helvetica, Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle">90</text>
  
  <!-- NOVENTA below -->
  <text x="200" y="265" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="8" fill="white" text-anchor="middle" opacity="0.7">NOVENTA</text>
  
  <!-- Accent dots -->
  <circle cx="200" cy="85" r="3" fill="#14b8a6" opacity="0.8"/>
  <circle cx="200" cy="310" r="2" fill="#14b8a6" opacity="0.4"/>
</svg>
