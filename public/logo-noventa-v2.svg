  <!-- 90 inside shield -->
  <text x="12" y="30" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="800" fill="white">90</text>
  <!-- NOVENTA wordmark -->
  <text x="44" y="38" font-family="Inter, Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="4" fill="white">NOVENTA</text>
  <!-- Speed lines -->
  <line x1="44" y1="48" x2="90" y2="48" stroke="#14b8a6" stroke-width="2" opacity="0.8"/>
  <line x1="95" y1="48" x2="110" y2="48" stroke="#14b8a6" stroke-width="2" opacity="0.4"/>
  <line x1="115" y1="48" x2="120" y2="48" stroke="#14b8a6" stroke-width="2" opacity="0.2"/>
</svg>
