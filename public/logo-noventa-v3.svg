<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" fill="none">
  <!-- Diagonal stripe (jersey inspired) -->
  <rect x="0" y="0" width="6" height="70" fill="#14b8a6" opacity="0.7" transform="skewX(-12)"/>
  <rect x="10" y="0" width="3" height="70" fill="#14b8a6" opacity="0.3" transform="skewX(-12)"/>
  <!-- NOVENTA bold italic -->
  <text x="28" y="48" font-family="Inter, Helvetica, Arial, sans-serif" font-size="40" font-weight="800" font-style="italic" letter-spacing="3" fill="white">NOVENTA</text>
  <!-- Dorsal number style 90 -->
  <text x="270" y="52" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="900" font-style="italic" fill="#14b8a6" opacity="0.6">90</text>
  <!-- Bottom bar -->
  <rect x="28" y="56" width="260" height="1" fill="white" opacity="0.1"/>
</svg>
