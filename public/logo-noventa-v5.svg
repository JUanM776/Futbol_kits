<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" fill="none">
  <!-- Hexagonal badge (modern sports) -->
  <polygon points="25,5 45,5 55,20 55,50 45,65 25,65 15,50 15,20" stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <polygon points="25,10 43,10 51,22 51,48 43,60 25,60 17,48 17,22" fill="#14b8a6" opacity="0.06"/>
  <!-- 90 centered in hex -->
  <text x="23" y="42" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="900" fill="white">90</text>
  <!-- NOVENTA -->
  <text x="70" y="44" font-family="Inter, Helvetica, Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="4" fill="white">NOVENTA</text>
  <!-- Thin sport line -->
  <line x1="70" y1="54" x2="140" y2="54" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="145" y1="54" x2="160" y2="54" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
